[build]
command = "npm run build"
publish = "public"

[functions]
  directory = "netlify/functions"

[build.environment]
NODE_VERSION = "22"

[build.processing]
skip_processing = false

[build.processing.html]
pretty_urls = true

[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

[build.processing.images]
compress = true

# =================================================================
# Redirecciones de URLs con 404 en Search Console
# =================================================================

# /contacta/ era el antiguo enlace del botón "Pide tu cita"
[[redirects]]
  from = "/contacta/"
  to = "/agenda/"
  status = 301
  force = true

# /tratamientos/estetica-dental/ → la URL real tiene el sufijo de localización
[[redirects]]
  from = "/tratamientos/estetica-dental/"
  to = "/tratamientos/estetica-dental-sant-boi-de-llobregat/"
  status = 301
  force = true

